version: '3.3'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trustspan
      POSTGRES_PASSWORD: trustspan
      POSTGRES_DB: trustspandb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://trustspan:trustspan@db:5432/trustspandb
      SECRET_KEY: change-me-in-production
      FRONTEND_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      MISTRAL_API_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  postgres_data: {}
